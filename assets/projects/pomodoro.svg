<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="-apple-system,'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="rg1" cx="0.05" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#ff2d2d" stop-opacity="0.55"/><stop offset="1" stop-color="#ff2d2d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg2" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0" stop-color="#8a0f0f" stop-opacity="0.6"/><stop offset="1" stop-color="#8a0f0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.045"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4b4b" stop-opacity="0.28"/><stop offset="1" stop-color="#c1121f" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="soften" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="22"/></filter>
    <clipPath id="panel"><rect x="28" y="24" width="664" height="372" rx="36"/></clipPath>
    <g id="wp">
      <rect width="720" height="420" fill="#0a0a0d"/>
      <rect width="720" height="420" fill="url(#rg1)"/>
      <rect width="720" height="420" fill="url(#rg2)"/>
      <path d="M-40 355 Q 200 295 420 355 T 780 295" stroke="#ff2d2d" stroke-width="60" stroke-opacity="0.14" fill="none"/>
    </g>
  </defs>

  <use href="#wp"/>
  <!-- floating glass bubbles -->
  <circle cx="605" cy="95" r="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.25"/>
  <circle cx="600" cy="89" r="5" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="665" cy="230" r="9" fill="#ff4b4b" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.2"/>

  <!-- glass panel -->
  <g clip-path="url(#panel)"><use href="#wp" filter="url(#soften)" opacity="0.95"/></g>
  <rect x="28" y="24" width="664" height="372" rx="36" fill="url(#sheen)"/>
  <rect x="28.5" y="24.5" width="663" height="371" rx="35.5" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
  <path d="M80 24.5 H 560" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round"/>

  <!-- language pill -->
  <rect x="68" y="62" width="72" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16"/>
  <circle cx="88" cy="79" r="5" fill="#663399"/>
  <text x="102" y="84" font-size="13.5" fill="#d1d1d6" letter-spacing="0.5">CSS</text>

  <!-- title + description -->
  <text x="68" y="164" font-size="42" font-weight="700" fill="#f5f5f7" letter-spacing="0.2">pomodoro</text>
  <text x="68" y="204" font-size="17.5" fill="#a1a1a6">A pomodoro timer that looks good enough</text>
  <text x="68" y="230" font-size="17.5" fill="#a1a1a6">to make you actually take breaks.</text>

  <!-- tech chips -->
<g>
      <rect x="68" y="262" width="67" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="101" y="284" font-size="14" fill="#d1d1d6" text-anchor="middle">HTML</text>
    </g>
<g>
      <rect x="146.8" y="262" width="59" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="176" y="284" font-size="14" fill="#d1d1d6" text-anchor="middle">CSS</text>
    </g>
<g>
      <rect x="217.4" y="262" width="116" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="275" y="284" font-size="14" fill="#d1d1d6" text-anchor="middle">JavaScript</text>
    </g>

  <!-- footer -->
  <path d="M68 328 H 652" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="68" y="366" font-size="14" fill="#8e8e93">pufferfish3e/pomodoro</text>
  <rect x="512" y="342" width="140" height="38" rx="19" fill="url(#btn)" stroke="#ff4b4b" stroke-opacity="0.45"/>
  <text x="572" y="366" font-size="14.5" fill="#ffb3b3" text-anchor="middle">View Project</text>
  <text x="636" y="366" font-size="15" fill="#ff6b6b" text-anchor="middle">&#8594;</text>
</svg>
