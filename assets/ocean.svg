<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="og1" cx="0.85" cy="0.9" r="0.6">
      <stop offset="0" stop-color="#ff2d2d" stop-opacity="0.35"/><stop offset="1" stop-color="#ff2d2d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og2" cx="0.1" cy="0.15" r="0.55">
      <stop offset="0" stop-color="#8a0f0f" stop-opacity="0.4"/><stop offset="1" stop-color="#8a0f0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="osheen" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.045"/>
    </linearGradient>
    <clipPath id="tank"><rect x="4" y="4" width="1192" height="212" rx="40"/></clipPath>
  </defs>

  <g clip-path="url(#tank)">
    <rect x="4" y="4" width="1192" height="212" rx="40" fill="#0a0a0d"/>
    <rect x="4" y="4" width="1192" height="212" rx="40" fill="url(#og1)"/>
    <rect x="4" y="4" width="1192" height="212" rx="40" fill="url(#og2)"/>

    <!-- sand -->
    <path d="M0 186 Q 300 172 600 186 T 1200 182 L 1200 220 L 0 220 Z" fill="#17171c"/>

    <!-- seaweed -->
    <g stroke-linecap="round" fill="none">
      <path d="M120 192 Q 110 158 122 128 Q 132 104 124 80" stroke="#3e4650" stroke-width="7">
        <animate attributeName="d" values="M120 192 Q 110 158 122 128 Q 132 104 124 80;M120 192 Q 130 158 118 128 Q 108 104 118 80;M120 192 Q 110 158 122 128 Q 132 104 124 80" dur="5s" repeatCount="indefinite"/>
      </path>
      <path d="M155 192 Q 148 164 158 140 Q 166 120 160 100" stroke="#525c68" stroke-width="6">
        <animate attributeName="d" values="M155 192 Q 148 164 158 140 Q 166 120 160 100;M155 192 Q 164 164 152 140 Q 144 120 152 100;M155 192 Q 148 164 158 140 Q 166 120 160 100" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M1060 192 Q 1050 152 1064 118 Q 1074 94 1066 70" stroke="#3e4650" stroke-width="7">
        <animate attributeName="d" values="M1060 192 Q 1050 152 1064 118 Q 1074 94 1066 70;M1060 192 Q 1072 152 1058 118 Q 1048 94 1058 70;M1060 192 Q 1050 152 1064 118 Q 1074 94 1066 70" dur="6s" repeatCount="indefinite"/>
      </path>
      <path d="M1100 192 Q 1094 168 1102 146" stroke="#525c68" stroke-width="5">
        <animate attributeName="d" values="M1100 192 Q 1094 168 1102 146;M1100 192 Q 1108 168 1098 146;M1100 192 Q 1094 168 1102 146" dur="3.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- creeper peeking from sand -->
    <g transform="translate(880,200)">
      <animateTransform attributeName="transform" type="translate" values="880 200;880 172;880 172;880 200;880 200" keyTimes="0;0.1;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>
      <rect width="34" height="34" fill="#3fae49"/>
      <rect x="5" y="7" width="8" height="8" fill="#141414"/><rect x="21" y="7" width="8" height="8" fill="#141414"/>
      <rect x="12" y="15" width="10" height="12" fill="#141414"/><rect x="8" y="22" width="4" height="8" fill="#141414"/><rect x="22" y="22" width="4" height="8" fill="#141414"/>
    </g>

    <!-- fish shoal -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="-120 0; 1320 0" dur="18s" repeatCount="indefinite"/>
      <g fill="#8e8e93">
        <path d="M0 70 Q 12 60 26 70 Q 12 80 0 70 Z M0 70 L -10 62 L -10 78 Z"/>
        <path d="M40 92 Q 52 82 66 92 Q 52 102 40 92 Z M40 92 L 30 84 L 30 100 Z" opacity="0.8"/>
        <path d="M18 116 Q 30 106 44 116 Q 30 126 18 116 Z M18 116 L 8 108 L 8 124 Z" opacity="0.6"/>
      </g>
    </g>

    <!-- pufferfish: swims, pauses, puffs -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="1300 95; 600 85; 600 85; -150 100" keyTimes="0;0.35;0.65;1" dur="20s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1;1.55;1.55;1;1" keyTimes="0;0.38;0.44;0.58;0.64;1" dur="20s" repeatCount="indefinite" additive="sum"/>
        <g stroke="#c1121f" stroke-width="2.5" stroke-linecap="round" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.38;0.44;0.58;0.64;1" dur="20s" repeatCount="indefinite"/>
          <line x1="0" y1="-26" x2="0" y2="-34"/><line x1="18" y1="-18" x2="24" y2="-24"/>
          <line x1="26" y1="0" x2="34" y2="0"/><line x1="18" y1="18" x2="24" y2="24"/>
          <line x1="0" y1="26" x2="0" y2="34"/><line x1="-18" y1="18" x2="-24" y2="24"/>
          <line x1="-26" y1="0" x2="-34" y2="0"/><line x1="-18" y1="-18" x2="-24" y2="-24"/>
        </g>
        <circle r="26" fill="#ff4b4b"/>
        <ellipse cx="0" cy="9" rx="17" ry="11" fill="#ffd7c2" opacity="0.9"/>
        <circle cx="-9" cy="-5" r="4.5" fill="#fff"/><circle cx="-10.5" cy="-4.5" r="2.2" fill="#0a0a0d"/>
        <circle cx="9" cy="-5" r="4.5" fill="#fff"/><circle cx="7.5" cy="-4.5" r="2.2" fill="#0a0a0d"/>
        <path d="M-4 8 Q 0 11 4 8" stroke="#0a0a0d" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M26 -2 L 40 -10 L 38 4 Z" fill="#c1121f">
          <animateTransform attributeName="transform" type="rotate" values="0 26 -2; 16 26 -2; 0 26 -2" dur="0.9s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>

    <!-- rising bubbles -->
    <g fill="none" stroke="#aeaeb2" stroke-width="1.4" opacity="0.6">
      <circle cx="200" cy="200" r="4"><animate attributeName="cy" values="200;20" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="9s" repeatCount="indefinite"/></circle>
      <circle cx="480" cy="200" r="3"><animate attributeName="cy" values="200;30" dur="7s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="7s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="750" cy="200" r="5"><animate attributeName="cy" values="200;25" dur="11s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="11s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="1140" cy="200" r="3"><animate attributeName="cy" values="200;40" dur="8s" begin="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="8s" begin="3s" repeatCount="indefinite"/></circle>
      <circle cx="620" cy="200" r="2.5"><animate attributeName="cy" values="200;50" dur="6s" begin="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="6s" begin="4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- treasure chest with glinting latch -->
    <g transform="translate(340,156)">
      <rect width="46" height="30" rx="4" fill="#4a2418"/>
      <rect width="46" height="10" rx="4" fill="#63301e"/>
      <rect x="20" y="6" width="6" height="10" fill="#ffcf5c">
        <animate attributeName="fill" values="#ffcf5c;#fff0c0;#ffcf5c" dur="2.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <rect x="4" y="4" width="1192" height="212" rx="40" fill="url(#osheen)"/>
  <rect x="4.5" y="4.5" width="1191" height="211" rx="39.5" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
  <path d="M80 4.5 H 900" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round"/>
</svg>
