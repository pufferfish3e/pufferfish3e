<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#120a0c"/>
      <stop offset="1" stop-color="#1c0e12"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4b4b" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#ff4b4b" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ff4b4b" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="260" rx="16" fill="url(#bg)"/>

  <!-- drifting waves -->
  <g opacity="0.5">
    <path fill="none" stroke="url(#wave)" stroke-width="2"
      d="M-100 200 Q 0 180 100 200 T 300 200 T 500 200 T 700 200 T 900 200 T 1100 200 T 1300 200">
      <animateTransform attributeName="transform" type="translate" values="0 0; 200 0; 0 0" dur="9s" repeatCount="indefinite"/>
    </path>
    <path fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.6"
      d="M-100 222 Q 0 206 100 222 T 300 222 T 500 222 T 700 222 T 900 222 T 1100 222 T 1300 222">
      <animateTransform attributeName="transform" type="translate" values="0 0; -200 0; 0 0" dur="12s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- bubbles -->
  <g fill="none" stroke="#ff8080" stroke-width="1.5" opacity="0.7">
    <circle cx="150" cy="220" r="5"><animate attributeName="cy" values="230;40" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="220" r="4"><animate attributeName="cy" values="230;50" dur="10s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="10s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="220" r="6"><animate attributeName="cy" values="230;60" dur="7s" begin="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="7s" begin="4s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="220" r="3"><animate attributeName="cy" values="230;70" dur="9s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="9s" begin="1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- pufferfish -->
  <g transform="translate(1020,110)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="4s" repeatCount="indefinite"/>
      <!-- spikes -->
      <g stroke="#c1121f" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-44" x2="0" y2="-56"/><line x1="31" y1="-31" x2="40" y2="-40"/>
        <line x1="44" y1="0" x2="56" y2="0"/><line x1="31" y1="31" x2="40" y2="40"/>
        <line x1="0" y1="44" x2="0" y2="56"/><line x1="-31" y1="31" x2="-40" y2="40"/>
        <line x1="-44" y1="0" x2="-56" y2="0"/><line x1="-31" y1="-31" x2="-40" y2="-40"/>
      </g>
      <circle r="44" fill="#ff4b4b"/>
      <circle r="44" fill="#ffffff" opacity="0.08"/>
      <ellipse cx="0" cy="14" rx="30" ry="20" fill="#ffd7c2" opacity="0.9"/>
      <!-- eyes -->
      <circle cx="-14" cy="-8" r="7" fill="#fff"/><circle cx="-12" cy="-7" r="3.5" fill="#1c0e12"/>
      <circle cx="16" cy="-8" r="7" fill="#fff"/><circle cx="18" cy="-7" r="3.5" fill="#1c0e12"/>
      <!-- mouth -->
      <path d="M-6 12 Q 1 18 8 12" stroke="#1c0e12" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- fin -->
      <path d="M-44 -4 L -66 -16 L -62 4 Z" fill="#c1121f">
        <animateTransform attributeName="transform" type="rotate" values="0 -44 -4; -14 -44 -4; 0 -44 -4" dur="1.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- text -->
  <text x="70" y="122" font-size="54" font-weight="bold" fill="#f5ede9" letter-spacing="2">Kendrick</text>
  <text x="72" y="162" font-size="17" fill="#b09a95" letter-spacing="1">applied ai &amp; analytics, singapore polytechnic</text>
  <rect x="70" y="74" width="120" height="3" fill="#ff4b4b">
    <animate attributeName="width" values="0;120" dur="1.6s" fill="freeze"/>
  </rect>
</svg>
