<svg width="1200" height="240" viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="bg1" cx="0.88" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#ff2d2d" stop-opacity="0.5"/><stop offset="1" stop-color="#ff2d2d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="0.08" cy="0.1" r="0.55">
      <stop offset="0" stop-color="#8a0f0f" stop-opacity="0.55"/><stop offset="1" stop-color="#8a0f0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bsheen" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.045"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2d2d" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff2d2d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff2d2d" stop-opacity="0"/>
    </linearGradient>
    <filter id="bsoften" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="18"/></filter>
    <clipPath id="bpanel"><rect x="4" y="4" width="1192" height="232" rx="40"/></clipPath>
  </defs>

  <g clip-path="url(#bpanel)">
    <rect x="4" y="4" width="1192" height="232" rx="40" fill="#0a0a0d"/>
    <rect x="4" y="4" width="1192" height="232" rx="40" fill="url(#bg1)"/>
    <rect x="4" y="4" width="1192" height="232" rx="40" fill="url(#bg2)"/>
    <g filter="url(#bsoften)">
      <path d="M-60 200 Q 260 150 560 195 T 1260 185" stroke="#ff2d2d" stroke-width="46" stroke-opacity="0.2" fill="none"/>
      <circle cx="1010" cy="70" r="80" fill="#ff2d2d" fill-opacity="0.12"/>
    </g>
    <!-- slow light streak drifting across -->
    <rect x="-400" y="4" width="400" height="232" fill="url(#streak)" opacity="0.5" transform="skewX(-18)">
      <animate attributeName="x" values="-400;1400;-400" dur="14s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="4" y="4" width="1192" height="232" rx="40" fill="url(#bsheen)"/>
  <rect x="4.5" y="4.5" width="1191" height="231" rx="39.5" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
  <path d="M80 4.5 H 900" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round"/>

  <!-- identity -->
  <text x="72" y="118" font-size="48" font-weight="700" fill="#f5f5f7" letter-spacing="0.3">Kendrick</text>
  <rect x="74" y="140" width="0" height="2.5" rx="1.25" fill="#ff4b4b">
    <animate attributeName="width" values="0;96" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </rect>
  <text x="74" y="176" font-size="17" fill="#a1a1a6" letter-spacing="0.3">Applied AI &amp; Analytics, Singapore Polytechnic</text>

  <!-- minimal pufferfish mark -->
  <g transform="translate(1090,120)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="5s" repeatCount="indefinite"/>
      <g stroke="#ff4b4b" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
        <line x1="0" y1="-40" x2="0" y2="-48"/><line x1="28" y1="-28" x2="34" y2="-34"/>
        <line x1="40" y1="0" x2="48" y2="0"/><line x1="28" y1="28" x2="34" y2="34"/>
        <line x1="0" y1="40" x2="0" y2="48"/><line x1="-28" y1="28" x2="-34" y2="34"/>
        <line x1="-40" y1="0" x2="-48" y2="0"/><line x1="-28" y1="-28" x2="-34" y2="-34"/>
      </g>
      <circle r="30" fill="none" stroke="#ff4b4b" stroke-width="2.5"/>
      <circle cx="-9" cy="-4" r="2.8" fill="#f5f5f7"/>
      <circle cx="9" cy="-4" r="2.8" fill="#f5f5f7"/>
      <path d="M-6 10 Q 0 14 6 10" stroke="#f5f5f7" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
