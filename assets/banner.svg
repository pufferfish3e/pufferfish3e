<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="'SF Pro Display','SF Pro Text',-apple-system,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <!-- wallpaper -->
    <radialGradient id="glow1" cx="0.22" cy="0.25" r="0.75">
      <stop offset="0" stop-color="#3a3a44"/>
      <stop offset="1" stop-color="#0d0d11" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.7">
      <stop offset="0" stop-color="#4a2026"/>
      <stop offset="1" stop-color="#0d0d11" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="soften" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="panelClip"><rect x="60" y="56" width="620" height="168" rx="34"/></clipPath>
    <clipPath id="orbClip"><circle cx="1010" cy="140" r="84"/></clipPath>

    <!-- shared wallpaper group -->
    <g id="wallpaper">
      <rect width="1200" height="280" fill="#0d0d11"/>
      <rect width="1200" height="280" fill="url(#glow1)"/>
      <rect width="1200" height="280" fill="url(#glow2)"/>
      <circle cx="330" cy="240" r="130" fill="#ff3b30" opacity="0.10"/>
      <circle cx="880" cy="30" r="110" fill="#8e8e93" opacity="0.08"/>
    </g>
  </defs>

  <use href="#wallpaper"/>
  <rect width="1200" height="280" rx="18" fill="none"/>

  <!-- drifting light orbs behind glass -->
  <g opacity="0.5">
    <circle cx="240" cy="120" r="60" fill="#ff3b30" opacity="0.16">
      <animate attributeName="cx" values="240;420;240" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="190" r="70" fill="#aeaeb2" opacity="0.10">
      <animate attributeName="cx" values="560;340;560" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- glass name panel: blurred wallpaper copy clipped to panel = refraction -->
  <g clip-path="url(#panelClip)">
    <use href="#wallpaper" filter="url(#soften)" opacity="0.9"/>
    <g opacity="0.55" filter="url(#soften)">
      <circle cx="240" cy="120" r="60" fill="#ff3b30" opacity="0.3">
        <animate attributeName="cx" values="240;420;240" dur="16s" repeatCount="indefinite"/>
      </circle>
      <circle cx="560" cy="190" r="70" fill="#d1d1d6" opacity="0.22">
        <animate attributeName="cx" values="560;340;560" dur="20s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  <rect x="60" y="56" width="620" height="168" rx="34" fill="url(#panelSheen)"/>
  <rect x="60.5" y="56.5" width="619" height="167" rx="33.5" fill="none" stroke="#ffffff" stroke-opacity="0.28"/>
  <rect x="62" y="58" width="616" height="164" rx="32" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M94 57 H 560" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>

  <text x="104" y="140" font-size="52" font-weight="700" fill="#f5f5f7" letter-spacing="0.5">Kendrick</text>
  <text x="106" y="182" font-size="17" font-weight="400" fill="#aeaeb2" letter-spacing="0.3">Applied AI &amp; Analytics, Singapore Polytechnic</text>

  <!-- glass orb with pufferfish -->
  <g clip-path="url(#orbClip)">
    <use href="#wallpaper" filter="url(#soften)"/>
  </g>
  <circle cx="1010" cy="140" r="84" fill="url(#panelSheen)"/>
  <circle cx="1010" cy="140" r="83.5" fill="none" stroke="#ffffff" stroke-opacity="0.28"/>
  <path d="M950 92 A 84 84 0 0 1 1070 92" stroke="#ffffff" stroke-opacity="0.35" fill="none" stroke-linecap="round"/>

  <g transform="translate(1010,142)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="4.5s" repeatCount="indefinite"/>
      <g stroke="#ff3b30" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
        <line x1="0" y1="-34" x2="0" y2="-43"/><line x1="24" y1="-24" x2="31" y2="-31"/>
        <line x1="34" y1="0" x2="43" y2="0"/><line x1="24" y1="24" x2="31" y2="31"/>
        <line x1="0" y1="34" x2="0" y2="43"/><line x1="-24" y1="24" x2="-31" y2="31"/>
        <line x1="-34" y1="0" x2="-43" y2="0"/><line x1="-24" y1="-24" x2="-31" y2="-31"/>
      </g>
      <circle r="34" fill="#ff3b30" opacity="0.92"/>
      <ellipse cx="0" cy="11" rx="22" ry="14" fill="#ffd9d5" opacity="0.9"/>
      <circle cx="-11" cy="-6" r="5.5" fill="#fff"/><circle cx="-9.5" cy="-5.5" r="2.6" fill="#1c1c1e"/>
      <circle cx="12" cy="-6" r="5.5" fill="#fff"/><circle cx="13.5" cy="-5.5" r="2.6" fill="#1c1c1e"/>
      <path d="M-5 9 Q 0 13 5 9" stroke="#1c1c1e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M-34 -3 L -50 -12 L -47 3 Z" fill="#e0352b">
        <animateTransform attributeName="transform" type="rotate" values="0 -34 -3; -13 -34 -3; 0 -34 -3" dur="1.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
